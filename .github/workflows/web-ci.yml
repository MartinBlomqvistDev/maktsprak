name: Web CI

on:
  push:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/web-ci.yml"]
  pull_request:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/web-ci.yml"]

jobs:
  lint-and-build:
    name: Lint & Build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build (includes TypeScript check)
        run: npm run build
